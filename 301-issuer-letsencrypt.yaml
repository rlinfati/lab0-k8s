apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lencr.stg
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: lencr.stg-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lencr
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: lencr-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik

# 906-node-cpw.yaml
version: v1alpha1
machine:
    network:
        interfaces:
          - deviceSelector:
              physical: true
            addresses:
              - 192.168.64.100/24
            routes:
              - network: 0.0.0.0/0
                gateway: 192.168.64.1
    time:
        bootTimeout: 5s # sudo chronyc ntpdata ntp.ubiobio.cl
cluster:
    allowSchedulingOnControlPlanes: true
---
apiVersion: v1alpha1
kind: HostnameConfig
auto: off
hostname: talos-cpw.home.arpa
